<script>
document.addEventListener("DOMContentLoaded", () => {

const story = {
    start: {
        text: "Are you broken? OFC, YOU MUST BE!!!",
        choices: [
            { text: "Yes", next: "broken" },
            { text: "Yes", next: "broken" }
        ]
    },

    broken: {
        text: "Who left??? You or she? OFC, IT MUST BE HER",
        choices: [
            { text: "Her", next: "She left" },
            { text: "Her", next: "She left" }
        ]
    },

    "She left": {
        text: "Just focus in your own life, bro... They're not worth it.",
        choices: [
            { text: "It's okay not to be fine... just for tonight", next: "start" },
            { text: "I'm good now. Starting from now, I'll focus on myself.", next: "bye"} 
        ]
    },

    bye: {
        text: "BYE, NIGGAS",
        choices: [
            { text: "Restart", next: "start" }
        ]
    }
};

const question = document.getElementById("question");
const choices = document.getElementById("choices");

function showNode(nodeName){
    const node = story[nodeName];

    if (!node) {
        question.textContent = "Error: Story node not found → " + nodeName;
        return;
    }

    question.textContent = node.text;
    choices.innerHTML = "";

    node.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice.text;
        btn.onclick = () => showNode(choice.next);
        choices.appendChild(btn);
    });
}

showNode("start");

});
</script>
