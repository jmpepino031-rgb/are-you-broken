<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Game</title>

<style>
body{
    background:#111;
    color:#00ff88;
    font-family:Courier New, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
    max-width:700px;
    padding:20px;
}

#question{
    font-size:2rem;
    margin-bottom:30px;
    min-height:80px;
}

button{
    background:transparent;
    border:2px solid #00ff88;
    color:#00ff88;
    padding:12px 25px;
    margin:10px;
    font-size:1.1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ff88;
    color:#111;
}
</style>
</head>

<body>

<div class="container">
    <div id="question"></div>
    <div id="choices"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const story = {
    start: {
        text: "Are you broken?",
        choices: [
            { text: "Yes", next: "broken" },
            { text: "No", next: "broken" }
        ]
    },

    broken: {
        text: "Who left? You or her?",
        choices: [
            { text: "Her", next: "sheLeft" },
            { text: "Me", next: "sheLeft" }
        ]
    },

    sheLeft: {
        text: "Focus on yourself. It's going to be okay.",
        choices: [
            { text: "Restart", next: "start" },
            { text: "I'm okay now", next: "bye" }
        ]
    },

    bye: {
        text: "Take care of yourself.",
        choices: [
            { text: "Restart", next: "start" }
        ]
    }
};

const question = document.getElementById("question");
const choices = document.getElementById("choices");

function showNode(nodeName){
    const node = story[nodeName];

    question.textContent = node.text;
    choices.innerHTML = "";

    node.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice.text;
        btn.onclick = () => showNode(choice.next);
        choices.appendChild(btn);
    });
}

showNode("start");

});
</script>

</body>
</html>
