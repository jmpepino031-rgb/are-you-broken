<script>
const story = {
    start: {
        text: "Are you broken? OFC, YOU MUST BE!!!",
        choices: [
            { text: "Yes", next: "broken" },
            { text: "No", next: "broken" }
        ]
    },

    broken: {
        text: "Who left??? You or she? OFC, IT MUST BE HER",
        choices: [
            { text: "Her", next: "sheLeft" },
            { text: "Me", next: "sheLeft" }
        ]
    },

    sheLeft: {
        text: "Just focus on your own life, bro... They're not worth it.",
        choices: [
            { 
                text: "It's okay not to be fine... just for tonight", 
                next: "start" 
            },
            { 
                text: "I'm good now. I'll focus on myself.", 
                next: "bye" 
            }
        ]
    },

    bye: {
        text: "Take care of yourself.",
        choices: [
            { text: "Restart", next: "start" }
        ]
    }
};

const question = document.getElementById("question");
const choices = document.getElementById("choices");

function showNode(nodeName){
    const node = story[nodeName];

    question.textContent = node.text;
    choices.innerHTML = "";

    node.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice.text;
        btn.onclick = () => showNode(choice.next);
        choices.appendChild(btn);
    });
}

showNode("start");
</script>
